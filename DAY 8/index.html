<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAY-8</title>
    <style>
        body{
            margin: 20px;
            background-color: antiquewhite;
        }
        .container{
             display: flex;
             align-items: center;
             gap: 20px;
        }
        .text{
          flex: 1;
          background-color: white;
          padding: 100px;
          border-radius: 20px;
        }
        .img{
            flex: 1;
        }
        .img image{
            width: 100px;
            height: 100px;
        }
        @media (max-width: 768px){
            .container{
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text">
            <h2>RESPONSIVE WEBPAGE</h2>
            <p>THIS IS A WEBSITE WITH TWO COLUMN LAYOUT</p>
        </div>
        <div class="img">
            <img src="image.jpg" alt="image">
        </div>
    </div>
</body>
</html>
