<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAY-6</title>
    <style>
        body{
            margin: 0
        }
        .hero{
            display: flex;
            background-image: url("image.jpg");
            background-position: center;
            background-size: cover;
            align-items: center;
            text-align: center;
            justify-content: center;
            height: 100vh;
            color: aliceblue;
        }
        .button{
            padding: 20px;
            border: 5px solid black;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            background-color: aqua;
        }
        .button:hover{
            background-color: beige;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div>
             <h1>WELCOME</h2>
             <b><p>This is a webpage with background image and text</p></b>
             <button class="button">Click Here</button>
        </div>
    </div>
</body>
</html>
