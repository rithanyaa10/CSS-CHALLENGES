<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DAY-9</title>
  <style>
    body {
      text-align: center;
      margin-top: 50px;
      background-color: rgb(206, 155, 59);
    }
    .ball {
      width: 50px;
      height: 50px;
      background-color: green;
      border-radius: 50%;
      margin: 0 auto;
      position: relative;
      animation: bounce 1s infinite alternate;
    }
    @keyframes bounce {
      from {
        top: 0px;
      }
      to {
        top: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="ball"></div>
</body>
</html>
