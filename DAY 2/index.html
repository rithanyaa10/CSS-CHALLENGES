<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAY-2</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 200px;
        }
        .card{
            width: 300px;
            padding: 20px;
            border: 10px solid black;
            background-color: lightgrey;
            border-radius: 20px;
            box-shadow: 5px 8px 16px;
            text-align: center;
            box-shadow: 16px rgba(red, green, blue, alpha);;
        }
        .card button{
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        .card button:hover{
            background-color: grey;
        }
    </style>
</head>
<body>
    <div class="card">
         <h2>This card is created with border radius,padding where the text is alligned in the middle</h2>
         <button>Click Here</button>
    </div>
</body>
</html>
