<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DAY-10</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: beige;
      text-align: center;
      padding-top: 80px;
    }
    .card {
      background-color: white;
      width: 300px;
      margin: 0 auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 2px 2px 10px gray;
    }
    .card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
    }
    .card h2 {
      margin-top: 15px;
      color: #333;
    }
    .card p {
      color: #666;
      font-size: 14px;
      margin: 10px 0 20px 0;
    }
    .card button {
      background-color: #3498db;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .card button:hover {
      background-color: #2176ae;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://img.magnific.com/free-vector/woman-with-long-brown-hair-pink-shirt_90220-2940.jpg?semt=ais_hybrid&w=740&q=80" alt="profile pic">
    <h2>Rithanyaa</h2>
    <p>Student who is passionate about Front-end Development</p>
    <button>Contact Me</button>
  </div>
</body>
</html>
