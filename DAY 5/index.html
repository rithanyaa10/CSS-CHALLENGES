<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAY-5</title>
    <style>
        body{
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            margin-top: 300px;
            background-color: bisque;
        }
        button{
            padding: 20px;
            background-color: rgba(167, 234, 232, 0.84);
            border: 5px solid black;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn1:hover{
            background-color: rgb(202, 134, 134);
        }
        .btn2:hover{
            transform: scale(5.0);
        }
        .btn3:hover{
            transform: rotate(50deg);
        }
    </style>
</head>
<body>
    <button class="btn1">Colour Change</button>
    <button class="btn2">Scale Up</button>
    <button class="btn3">Rotate</button>
</body>
</html>
